[defaults]
inventory = ./inventory.ini
roles_path = ./roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
nocows = True
# group_vars/all.yml (gitignored) is loaded automatically from this directory.

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
pipelining = True
