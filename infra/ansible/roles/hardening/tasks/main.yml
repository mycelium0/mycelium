#
# Mycelium Phase 0 — hardening role.
# Author: mindicator & silicon bags quartet
#
# Baseline host hardening for a fresh Debian/Ubuntu node:
#   - UFW host firewall: allow OpenSSH + the node listen port (443/tcp); deny everything else.
#   - unattended-upgrades: automatic security patches (supply chain / patch cadence).
#   - sysctl: conservative network defaults.
#   - fail2ban: optional, flagged off by default.
#
# The firewall is deliberately minimal: the only externally reachable surfaces are SSH (operator
# management) and the single VLESS+REALITY listen port. node_exporter and the cover site bind to
# loopback and are never exposed.
---
- name: Install baseline hardening packages
  ansible.builtin.apt:
    name:
      - ufw
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure config drop-in directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/ssh/sshd_config.d
    - /etc/systemd/journald.conf.d

# ---------------------------------------------------------------------------
# SSH: key-only authentication (managed drop-in).
# Disabling password auth on a root inventory is a lockout risk, so we refuse to
# do it unless the connecting user already has an authorized key, validate the
# config with `sshd -t` BEFORE installing it, and RELOAD (not restart) so the live
# session survives.
# ---------------------------------------------------------------------------
- name: Hardening — check for an authorized SSH key before locking down password auth
  when: hardening_disable_password_auth | bool
  ansible.builtin.command:
    cmd: "test -s {{ (ansible_user_dir | default('/root')) ~ '/.ssh/authorized_keys' }}"
  register: myc_authkeys
  changed_when: false
  failed_when: false

- name: Hardening — refuse to disable password auth with no key present (anti-lockout)
  when:
    - hardening_disable_password_auth | bool
    - myc_authkeys.rc != 0
  ansible.builtin.fail:
    msg: >-
      Refusing to disable SSH password authentication: no authorized_keys found for the
      connecting user. Install a public key first (ssh-copy-id), or set
      hardening_disable_password_auth=false. This guard prevents locking yourself out.

- name: Hardening — managed sshd drop-in (key-only, no root password login)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/60-mycelium.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
    content: |
      # Managed by Mycelium hardening role. Do not edit by hand.
      PubkeyAuthentication yes
      PasswordAuthentication {{ 'no' if hardening_disable_password_auth | bool else 'yes' }}
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PermitRootLogin prohibit-password
      PermitEmptyPasswords no
      MaxAuthTries 3
      LoginGraceTime 30
      X11Forwarding no
      AllowAgentForwarding no
  notify: Reload sshd

# ---------------------------------------------------------------------------
# No-logs posture: systemd-journald in volatile (RAM-only) storage — logs never
# hit disk (SECURITY.md §4.2). What is not written cannot be seized or compelled.
# ---------------------------------------------------------------------------
- name: Hardening — journald volatile (RAM-only) storage drop-in
  when: hardening_journald_volatile | bool
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/60-mycelium-volatile.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Mycelium hardening role. Do not edit by hand.
      # RAM-only logs: nothing is persisted to disk (no-logs posture, SECURITY.md §4.2).
      [Journal]
      Storage=volatile
      RuntimeMaxUse=64M
      ForwardToSyslog=no
  notify: Restart systemd-journald

# A pre-existing /var/log/journal directory makes journald persist to disk and OVERRIDES
# Storage=volatile, so the drop-in alone is fail-OPEN (Audit-0004 F-005). Remove it, restart now, and
# verify — mirroring the bash bootstrap's fail-closed harden_journald.
- name: Hardening — remove any persistent journal directory (it overrides Storage=volatile)
  when: hardening_journald_volatile | bool
  ansible.builtin.file:
    path: /var/log/journal
    state: absent
  notify: Restart systemd-journald

- name: Hardening — restart journald now to apply volatile storage (so the verify below is meaningful)
  when: hardening_journald_volatile | bool
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Hardening — verify the no-logs posture actually holds (fail-closed)
  when: hardening_journald_volatile | bool
  block:
    - name: Stat the persistent journal directory
      ansible.builtin.stat:
        path: /var/log/journal
      register: myc_journal_dir
    - name: Assert journald is volatile (no persistent journal directory remains)
      ansible.builtin.assert:
        that:
          - not myc_journal_dir.stat.exists
        fail_msg: "/var/log/journal still exists — journald would persist logs to disk despite Storage=volatile; the no-logs posture (SECURITY.md §4.2) is broken."
        success_msg: "journald is volatile — no persistent journal directory."

# ---------------------------------------------------------------------------
# Host firewall (UFW) — default deny inbound, allow SSH + listen_port only.
# ---------------------------------------------------------------------------
- name: Set UFW default policy — deny inbound
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default policy — allow outbound
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow inbound OpenSSH (rate-limited to blunt brute-force)
  community.general.ufw:
    rule: limit
    name: OpenSSH

- name: Allow inbound node listen port (primary VLESS+REALITY transport)
  community.general.ufw:
    rule: allow
    port: "{{ listen_port | string }}"
    proto: tcp
    comment: "mycelium vless-reality data plane"

- name: Enable UFW with logging OFF (UFW logs inbound source IPs to the kernel log -> journald)
  # Audit-0004 F-005: UFW connection logging records client source IPs; on a node that may face
  # coercion that is a user-trail to disk. The no-logs posture wins over per-packet firewall logs.
  community.general.ufw:
    state: enabled
    logging: "off"

# ---------------------------------------------------------------------------
# Automatic security updates.
# ---------------------------------------------------------------------------
- name: Enable unattended-upgrades (periodic apt config)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      // Managed by Mycelium hardening role. Do not edit by hand.
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";

- name: Ensure the security origin is selected for unattended-upgrades
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\s*//?\s*"\$\{distro_id\}:\$\{distro_codename\}-security";'
    line: '        "${distro_id}:${distro_codename}-security";'
    insertafter: 'Unattended-Upgrade::Allowed-Origins'
    state: present
  notify: Restart unattended-upgrades

# ---------------------------------------------------------------------------
# Conservative network sysctl.
# ---------------------------------------------------------------------------
- name: Apply baseline network sysctl
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/60-mycelium-hardening.conf
    sysctl_set: true
    reload: true
    state: present
  loop:
    # Ignore ICMP redirects and source-routed packets (spoofing resistance).
    - { name: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { name: "net.ipv4.conf.all.accept_source_route", value: "0" }
    - { name: "net.ipv6.conf.all.accept_redirects", value: "0" }
    - { name: "net.ipv6.conf.all.accept_source_route", value: "0" }
    # Reverse-path filtering and SYN-flood protection.
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.tcp_syncookies", value: "1" }
    # Log martians for visibility.
    - { name: "net.ipv4.conf.all.log_martians", value: "1" }
    # BBR + fq give the data plane better behaviour on lossy/throttled links.
    - { name: "net.core.default_qdisc", value: "fq" }
    - { name: "net.ipv4.tcp_congestion_control", value: "bbr" }

# ---------------------------------------------------------------------------
# fail2ban (optional, flagged).
# ---------------------------------------------------------------------------
- name: Configure fail2ban (optional)
  when: hardening_enable_fail2ban | bool
  block:
    - name: Install fail2ban
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Deploy fail2ban sshd jail
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/mycelium-sshd.local
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by Mycelium hardening role.
          [sshd]
          enabled = true
          backend = systemd
          maxretry = 5
          findtime = 600
          bantime = 3600
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        enabled: true
        state: started
