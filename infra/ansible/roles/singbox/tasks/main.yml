#
# Mycelium Phase 0 — singbox role (PRIMARY engine).
# Author: mindicator & silicon bags quartet
#
# Brings up the multi-protocol sing-box data plane:
#   1. Download a PINNED, checksum-verified sing-box release to /usr/local/bin/sing-box.
#   2. Create the sing-box system user, /usr/local/etc/sing-box/, and a root-only state directory.
#   3. Copy the Mycelium control tooling (myceliumctl) and the sing-box config template to the node.
#   4. Generate identity material — ONCE, idempotently — for the ENABLED protocols only:
#        REALITY keypair ("sing-box generate reality-keypair"), client UUIDs
#        ("sing-box generate uuid"), shortIds ("openssl rand -hex 8"), and SS/Trojan/ShadowTLS/
#        TUIC/Hysteria2 passwords ("openssl rand -base64"). Self-signed TLS pairs for the QUIC/TLS
#        protocols come from "openssl req" (no custom crypto). Stored only in the root-only state dir.
#   5. Render config.json via the copied myceliumctl (engine singbox) when present; else a Jinja
#      fallback. Validate with "sing-box check" before promoting it.
#   6. Install + enable + start a hardened sing-box.service; open ONLY the enabled protocols' ports.
#   7. Render client subscriptions and FETCH them to the operator's ./out/subscriptions/.
#
# Key-handling invariant: REALITY PRIVATE keys, client UUIDs, and all server-side passwords NEVER
# leave the node. Only the REALITY PUBLIC key and the rendered per-client subscriptions are fetched.
---
# ---------------------------------------------------------------------------
# 0. Preconditions — fail closed on unverified pins, unsupported arch, or placeholders.
# ---------------------------------------------------------------------------
- name: Assert architecture is supported by an upstream sing-box asset
  ansible.builtin.assert:
    that:
      - ansible_facts['architecture'] in singbox_arch_key
    fail_msg: >-
      No pinned sing-box asset for architecture '{{ ansible_facts['architecture'] }}'.
      Supported: {{ singbox_arch_key.keys() | list }}.

- name: Assert required operator variables are set (fail closed on the .example sentinels)
  ansible.builtin.assert:
    that:
      - donor_host is defined and donor_host | length > 0 and donor_host != 'donor.example.com'
      - donor_sni is defined and donor_sni | length > 0 and donor_sni != 'donor.example.com'
      - node_address is defined and node_address | length > 0 and node_address != 'NODE_PUBLIC_IP'
      - client_names is defined and (client_names | length) > 0
    fail_msg: >-
      Set real values in group_vars/all.yml before deploying. donor_host/donor_sni must be a real
      external donor (not the 'donor.example.com' placeholder), node_address must be this node's
      reachability address (not the 'NODE_PUBLIC_IP' placeholder), and client_names must be a
      non-empty list. These are not secrets; only the donor selection and addressing.

- name: Assert at least one sing-box protocol is enabled
  ansible.builtin.assert:
    that:
      - >-
        (enable_vless_reality_vision | bool) or (enable_vless_reality_grpc | bool)
        or (enable_vless_reality_xhttp | bool) or (enable_hysteria2 | bool)
        or (enable_tuic | bool) or (enable_ss2022 | bool) or (enable_shadowtls | bool)
        or (enable_trojan | bool)
    fail_msg: >-
      No sing-box protocol is enabled. Set at least one enable_* toggle (the default is
      enable_vless_reality_vision: true). AmneziaWG is a separate, non-sing-box path.

- name: Resolve per-architecture sing-box asset + checksum
  ansible.builtin.set_fact:
    _sb_arch: "{{ singbox_arch_key[ansible_facts['architecture']] }}"
    _sb_dir: "sing-box-{{ singbox_version | regex_replace('^v', '') }}-linux-{{ singbox_arch_key[ansible_facts['architecture']] }}"
    _sb_asset: "sing-box-{{ singbox_version | regex_replace('^v', '') }}-linux-{{ singbox_arch_key[ansible_facts['architecture']] }}.tar.gz"
    _sb_sha256: "{{ singbox_sha256[singbox_arch_key[ansible_facts['architecture']]] }}"

- name: Assert the sing-box version pin meets the minimum (>= 1.11.x)
  ansible.builtin.assert:
    that:
      - (singbox_version | regex_replace('^v', '')) is version('1.11.0', '>=', version_type='loose')
    fail_msg: "singbox_version must be >= 1.11.x (got {{ singbox_version }})."

- name: Assert the sing-box checksum has been recorded (fail closed on placeholders)
  ansible.builtin.assert:
    that:
      - _sb_sha256 is match('^[0-9a-fA-F]{64}$')
    fail_msg: >-
      singbox_sha256.{{ _sb_arch }} is not a 64-char SHA256. Record the real checksum from the
      {{ singbox_version }} release for asset '{{ _sb_asset }}' before deploying.

- name: Install runtime dependencies (jq for render fallback, openssl for keys/passwords/certs, tar, ca-certs)
  ansible.builtin.apt:
    name:
      - jq
      - openssl
      - tar
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: 3600

# ---------------------------------------------------------------------------
# 1. System user, directories.
# ---------------------------------------------------------------------------
- name: Create the sing-box system group
  ansible.builtin.group:
    name: "{{ singbox_run_group }}"
    system: true

- name: Create the sing-box system user (no shell, no home login)
  ansible.builtin.user:
    name: "{{ singbox_run_user }}"
    group: "{{ singbox_run_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create sing-box config + tooling directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0750"
  loop:
    - "{{ singbox_etc_dir }}"
    - "{{ singbox_tooling_dir }}"

# The state dir holds the root-only identity.json AND a few service-readable subdirs (tls/, run/).
# Mode 0710 (root:sing-box) lets the service GROUP traverse into known sub-paths (it cannot list the
# directory or read identity.json, which stays 0600 root:root). This keeps every per-node secret in
# one place while still letting the unprivileged service reach its certs and working directory.
- name: Create the state directory (root-owned; group-traversable for the service)
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}"
    state: directory
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0710"

- name: Create the writable runtime working directory (service-owned)
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}/run"
    state: directory
    owner: "{{ singbox_run_user }}"
    group: "{{ singbox_run_group }}"
    mode: "0750"

# ---------------------------------------------------------------------------
# 2. Download + verify + install the pinned sing-box release.
# ---------------------------------------------------------------------------
- name: Check the currently installed sing-box version (if any)
  ansible.builtin.command:
    cmd: "{{ singbox_bin_path }} version"
  register: _sb_installed
  changed_when: false
  failed_when: false

- name: Install the pinned sing-box release
  when: (singbox_version | regex_replace('^v', '')) not in (_sb_installed.stdout | default(''))
  block:
    - name: Create a temporary download workspace
      ansible.builtin.tempfile:
        state: directory
        suffix: singbox-dl
      register: _sb_tmp

    - name: Download the pinned sing-box release tarball (checksum-verified)
      ansible.builtin.get_url:
        url: "{{ singbox_download_base }}/{{ singbox_version }}/{{ _sb_asset }}"
        dest: "{{ _sb_tmp.path }}/{{ _sb_asset }}"
        checksum: "sha256:{{ _sb_sha256 }}"
        mode: "0640"

    - name: Unpack the sing-box release
      ansible.builtin.unarchive:
        src: "{{ _sb_tmp.path }}/{{ _sb_asset }}"
        dest: "{{ _sb_tmp.path }}"
        remote_src: true

    - name: Install the sing-box binary to /usr/local/bin
      ansible.builtin.copy:
        src: "{{ _sb_tmp.path }}/{{ _sb_dir }}/sing-box"
        dest: "{{ singbox_bin_path }}"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart sing-box

  always:
    - name: Remove the temporary download workspace
      ansible.builtin.file:
        path: "{{ _sb_tmp.path }}"
        state: absent
      when: _sb_tmp.path is defined

# ---------------------------------------------------------------------------
# 3. Copy the Mycelium control tooling + sing-box config template to the node.
# ---------------------------------------------------------------------------
- name: Detect whether the control tooling is present on the control host
  ansible.builtin.stat:
    path: "{{ singbox_control_tooling_src }}"
  delegate_to: localhost
  become: false
  register: _control_src

- name: Copy the Mycelium control tooling to the node
  ansible.builtin.copy:
    src: "{{ singbox_control_tooling_src }}"
    dest: "{{ singbox_tooling_dir }}/control/"
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0750"
  when: _control_src.stat.exists

- name: Detect whether a prebuilt myceliumctl supporting the singbox engine is present
  ansible.builtin.stat:
    path: "{{ singbox_tooling_dir }}/control/myceliumctl"
  register: _myceliumctl

- name: Render the sing-box config template to the node (used by the myceliumctl engine path)
  ansible.builtin.template:
    src: config.template.json
    dest: "{{ singbox_tooling_dir }}/{{ singbox_config_template_name }}"
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0640"
  vars:
    # The template references _identity; on this copy step it is not yet assembled. Provide an empty
    # skeleton so the template renders as a structural reference (the real values are injected at
    # step 5). This copy is a convenience artefact for the future myceliumctl --engine singbox path.
    _identity:
      reality: { private_key: "SENTINEL", public_key: "SENTINEL" }
      short_ids: ["SENTINEL"]
      clients: {}
      passwords:
        hysteria2: {}
        tuic: {}
        ss2022: {}
        ss2022_server: "SENTINEL"
        shadowtls: {}
        shadowtls_ss_server: "SENTINEL"
        trojan: {}
  failed_when: false

# ---------------------------------------------------------------------------
# 4. Generate identity material ONCE (idempotent), for the ENABLED protocols only.
#    Stored in the root-only state dir. Re-runs reuse existing material so keys/passwords do not
#    rotate on every deploy (rotation is an explicit operator action — delete the state file).
# ---------------------------------------------------------------------------
- name: Look for previously generated identity state
  ansible.builtin.stat:
    path: "{{ singbox_state_dir }}/identity.json"
  register: _identity_state

- name: Generate REALITY keypair, client UUIDs, shortIds and per-protocol passwords (first run only)
  when: not _identity_state.stat.exists
  block:
    - name: Generate the REALITY x25519 keypair (audited sing-box built-in)
      ansible.builtin.command:
        cmd: "{{ singbox_bin_path }} generate reality-keypair"
      register: _reality_keypair
      changed_when: true
      no_log: true

    - name: Parse the REALITY private/public key from "sing-box generate reality-keypair" output
      ansible.builtin.set_fact:
        # Output is two lines: "PrivateKey: ..." / "PublicKey: ..." (match case-insensitively).
        _reality_private: >-
          {{ (_reality_keypair.stdout_lines
              | select('search', '(?i)private')
              | map('regex_replace', '^.*?:\s*', '')
              | list | first) }}
        _reality_public: >-
          {{ (_reality_keypair.stdout_lines
              | select('search', '(?i)public')
              | map('regex_replace', '^.*?:\s*', '')
              | list | first) }}
      no_log: true

    - name: Generate a UUID per client name (audited sing-box built-in)
      ansible.builtin.command:
        cmd: "{{ singbox_bin_path }} generate uuid"
      register: _client_uuid_cmds
      changed_when: true
      loop: "{{ client_names }}"
      no_log: true

    - name: Generate REALITY shortIds (openssl rand -hex 8)
      ansible.builtin.command:
        cmd: "openssl rand -hex 8"
      register: _shortid_cmds
      changed_when: true
      loop: "{{ range(0, shortid_count | int) | list }}"
      no_log: true

    # One base64 password per (client x password-using protocol), plus two server-wide SS-2022
    # PSKs. openssl rand -base64 32 yields a 256-bit secret suitable as a password. No custom crypto.
    - name: Generate per-client protocol passwords (openssl rand -base64 32)
      ansible.builtin.command:
        cmd: "openssl rand -base64 32"
      register: _pw_cmds
      changed_when: true
      loop: "{{ client_names | product(_pw_protocols) | list }}"
      loop_control:
        label: "{{ item[1] }}:{{ item[0] }}"
      vars:
        _pw_protocols: ["hysteria2", "tuic", "ss2022", "shadowtls", "trojan"]
      no_log: true

    - name: Generate the two server-wide Shadowsocks-2022 PSKs (openssl rand -base64 32)
      ansible.builtin.command:
        cmd: "openssl rand -base64 32"
      register: _server_pw_cmds
      changed_when: true
      loop: ["ss2022_server", "shadowtls_ss_server"]
      no_log: true

    - name: "Assemble the per-client password map (protocol then client to password)"
      ansible.builtin.set_fact:
        _pw_by_proto: >-
          {{ dict(["hysteria2", "tuic", "ss2022", "shadowtls", "trojan"] | zip(
               [
                 dict(_pw_cmds.results | selectattr('item.1', 'eq', 'hysteria2') | map(attribute='item.0') | list
                      | zip(_pw_cmds.results | selectattr('item.1', 'eq', 'hysteria2') | map(attribute='stdout') | map('trim') | list)),
                 dict(_pw_cmds.results | selectattr('item.1', 'eq', 'tuic') | map(attribute='item.0') | list
                      | zip(_pw_cmds.results | selectattr('item.1', 'eq', 'tuic') | map(attribute='stdout') | map('trim') | list)),
                 dict(_pw_cmds.results | selectattr('item.1', 'eq', 'ss2022') | map(attribute='item.0') | list
                      | zip(_pw_cmds.results | selectattr('item.1', 'eq', 'ss2022') | map(attribute='stdout') | map('trim') | list)),
                 dict(_pw_cmds.results | selectattr('item.1', 'eq', 'shadowtls') | map(attribute='item.0') | list
                      | zip(_pw_cmds.results | selectattr('item.1', 'eq', 'shadowtls') | map(attribute='stdout') | map('trim') | list)),
                 dict(_pw_cmds.results | selectattr('item.1', 'eq', 'trojan') | map(attribute='item.0') | list
                      | zip(_pw_cmds.results | selectattr('item.1', 'eq', 'trojan') | map(attribute='stdout') | map('trim') | list))
               ]
             )) }}
      no_log: true

    - name: Assemble the identity document
      ansible.builtin.set_fact:
        _identity:
          version: 1
          generated_at: "{{ ansible_date_time.iso8601 | default('') }}"
          reality:
            private_key: "{{ _reality_private | trim }}"
            public_key: "{{ _reality_public | trim }}"
          short_ids: "{{ _shortid_cmds.results | map(attribute='stdout') | map('trim') | list }}"
          clients: >-
            {{ dict(client_names | zip(_client_uuid_cmds.results
                | map(attribute='stdout') | map('trim') | list)) }}
          passwords: >-
            {{ _pw_by_proto | combine({
                 'ss2022_server': (_server_pw_cmds.results | selectattr('item', 'eq', 'ss2022_server') | map(attribute='stdout') | map('trim') | list | first),
                 'shadowtls_ss_server': (_server_pw_cmds.results | selectattr('item', 'eq', 'shadowtls_ss_server') | map(attribute='stdout') | map('trim') | list | first)
               }) }}
      no_log: true

    - name: Persist the identity document (root-only)
      ansible.builtin.copy:
        dest: "{{ singbox_state_dir }}/identity.json"
        content: "{{ _identity | to_nice_json }}\n"
        owner: root
        group: root
        mode: "0600"
      no_log: true

# ---------------------------------------------------------------------------
# 4b. Reconcile the client roster on RE-RUN (add/revoke without rotating REALITY keys).
#     Adds UUIDs + passwords for newly added client_names; drops clients no longer listed.
# ---------------------------------------------------------------------------
- name: Load the current identity document
  ansible.builtin.slurp:
    src: "{{ singbox_state_dir }}/identity.json"
  register: _identity_raw
  no_log: true

- name: Decode the current identity document
  ansible.builtin.set_fact:
    _identity: "{{ _identity_raw.content | b64decode | from_json }}"
  no_log: true

- name: Determine clients to add (in client_names but missing a UUID)
  ansible.builtin.set_fact:
    _clients_to_add: "{{ client_names | difference(_identity.clients.keys() | list) }}"

- name: Generate UUIDs for newly added clients
  ansible.builtin.command:
    cmd: "{{ singbox_bin_path }} generate uuid"
  register: _added_uuid_cmds
  changed_when: true
  loop: "{{ _clients_to_add }}"
  when: _clients_to_add | length > 0
  no_log: true

- name: Generate passwords for newly added clients (openssl rand -base64 32)
  ansible.builtin.command:
    cmd: "openssl rand -base64 32"
  register: _added_pw_cmds
  changed_when: true
  loop: "{{ _clients_to_add | product(['hysteria2', 'tuic', 'ss2022', 'shadowtls', 'trojan']) | list }}"
  loop_control:
    label: "{{ item[1] }}:{{ item[0] }}"
  when: _clients_to_add | length > 0
  no_log: true

- name: Merge added clients (UUIDs) and revoke clients no longer listed
  ansible.builtin.set_fact:
    _identity: >-
      {{ _identity | combine({
        'clients': (
          _identity.clients
          | combine(dict(_clients_to_add | zip(
              (_added_uuid_cmds.results | default([])) | map(attribute='stdout') | map('trim') | list
            )))
        ) | dict2items | selectattr('key', 'in', client_names) | items2dict
      }, recursive=True) }}
  no_log: true

- name: Merge added clients' passwords and revoke removed clients per protocol
  ansible.builtin.set_fact:
    _identity: >-
      {{ _identity | combine({
        'passwords': ((_identity.passwords | default({})) | combine(
          dict(['hysteria2', 'tuic', 'ss2022', 'shadowtls', 'trojan'] | zip([
            ((_identity.passwords.hysteria2 | default({})) | combine(dict(_clients_to_add | zip((_added_pw_cmds.results | default([])) | selectattr('item.1', 'eq', 'hysteria2') | map(attribute='stdout') | map('trim') | list)))) | dict2items | selectattr('key', 'in', client_names) | items2dict,
            ((_identity.passwords.tuic      | default({})) | combine(dict(_clients_to_add | zip((_added_pw_cmds.results | default([])) | selectattr('item.1', 'eq', 'tuic')      | map(attribute='stdout') | map('trim') | list)))) | dict2items | selectattr('key', 'in', client_names) | items2dict,
            ((_identity.passwords.ss2022    | default({})) | combine(dict(_clients_to_add | zip((_added_pw_cmds.results | default([])) | selectattr('item.1', 'eq', 'ss2022')    | map(attribute='stdout') | map('trim') | list)))) | dict2items | selectattr('key', 'in', client_names) | items2dict,
            ((_identity.passwords.shadowtls | default({})) | combine(dict(_clients_to_add | zip((_added_pw_cmds.results | default([])) | selectattr('item.1', 'eq', 'shadowtls') | map(attribute='stdout') | map('trim') | list)))) | dict2items | selectattr('key', 'in', client_names) | items2dict,
            ((_identity.passwords.trojan    | default({})) | combine(dict(_clients_to_add | zip((_added_pw_cmds.results | default([])) | selectattr('item.1', 'eq', 'trojan')    | map(attribute='stdout') | map('trim') | list)))) | dict2items | selectattr('key', 'in', client_names) | items2dict
          ]))
        ))
      }, recursive=True) }}
  no_log: true

- name: Persist the reconciled identity document
  ansible.builtin.copy:
    dest: "{{ singbox_state_dir }}/identity.json"
    content: "{{ _identity | to_nice_json }}\n"
    owner: root
    group: root
    mode: "0600"
  no_log: true

# ---------------------------------------------------------------------------
# 4c. Self-signed TLS pairs for the protocols that terminate TLS with a real cert
#     (Hysteria2, TUIC, Trojan). REALITY-based VLESS does NOT use these — it borrows the donor
#     handshake. Generated via "openssl req" (audited; no custom crypto), once, root-only.
# ---------------------------------------------------------------------------
- name: Create the on-node TLS material directory (service-readable)
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}/tls"
    state: directory
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0750"

- name: Generate a self-signed TLS pair per TLS-terminating enabled protocol (Jinja fallback path)
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 -nodes
      -keyout {{ singbox_state_dir }}/tls/{{ item }}.key
      -out {{ singbox_state_dir }}/tls/{{ item }}.crt
      -days 3650 -subj "/CN={{ donor_sni }}"
    creates: "{{ singbox_state_dir }}/tls/{{ item }}.crt"
  loop: "{{ ['hysteria2', 'tuic', 'trojan'] | select('in', _tls_enabled_protocols) | list }}"
  vars:
    _tls_enabled_protocols: >-
      {{ (['hysteria2'] if enable_hysteria2 | bool else [])
       + (['tuic'] if enable_tuic | bool else [])
       + (['trojan'] if enable_trojan | bool else []) }}
  no_log: true

# The myceliumctl renderer (control/lib/render_singbox.sh) terminates HY2/TUIC/Trojan with ONE
# shared certificate path (params.tls_certificate_path / tls_key_path). Generate a single shared
# self-signed pair for that path whenever any TLS-cert protocol is enabled. It is per-NODE (ADR-0014:
# no shared network key material) and self-signed; clients trust it ONLY via the pin emitted on the
# subscription (NEVER insecure:true).
- name: Generate the shared self-signed TLS pair used by the myceliumctl render path
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 -nodes
      -keyout {{ singbox_state_dir }}/tls/server.key
      -out {{ singbox_state_dir }}/tls/server.crt
      -days 3650 -subj "/CN={{ donor_sni }}"
    creates: "{{ singbox_state_dir }}/tls/server.crt"
  when: (enable_hysteria2 | bool) or (enable_tuic | bool) or (enable_trojan | bool)
  no_log: true

- name: Set ownership/permissions on the generated TLS material (service-readable, not writable)
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}/tls"
    state: directory
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0750"
    recurse: true

# ---------------------------------------------------------------------------
# 5. Render config.json — prefer myceliumctl (engine singbox); else a Jinja fallback.
#
# The control CLI (myceliumctl) consumes TWO inputs, NOT one combined blob:
#   --params  a FLAT params JSON (control/params.example.json schema): donor_host/donor_sni,
#             reality_{private,public}_key, short_ids[], <proto>_enabled / <proto>_port flags,
#             tls_{sni,certificate_path,key_path}, and the shared per-protocol secrets.
#   --state   an identities JSON: { "version": 1, "clients": [ { "name", "id", "created" } ] }.
# The role's on-node identity.json uses a different (nested) shape, so we PROJECT it into those two
# files here. This matches the REAL CLI contract:
#   myceliumctl render-server --engine singbox --template T --params P --state S --out O
#   myceliumctl subscription  --engine singbox --params P --state S --out DIR
# (the historical "render-server --input ..." / "render-client --input --identity --out-dir ..."
#  interface never existed in this tool, so the old preferred path was a guaranteed no-op).
# ---------------------------------------------------------------------------
- name: Project the identity document into the myceliumctl --params file (flat schema, root-only)
  ansible.builtin.copy:
    dest: "{{ singbox_state_dir }}/render-params.json"
    content: |
      {{ {
        'engine': 'singbox',
        'node_address': node_address,
        'donor_host': donor_host,
        'donor_sni': donor_sni,
        'reality_private_key': _identity.reality.private_key,
        'reality_public_key': _identity.reality.public_key,
        'short_ids': _identity.short_ids,
        'tls_sni': donor_sni,
        'tls_certificate_path': singbox_state_dir ~ '/tls/server.crt',
        'tls_key_path': singbox_state_dir ~ '/tls/server.key',
        'grpc_service_name': 'grpc',
        'xhttp_path': '/xhttp',
        'shadowtls_handshake_server': singbox_shadowtls_handshake_server,
        'shadowtls_handshake_port': singbox_shadowtls_handshake_port | int,
        'ss_password': _identity.passwords.ss2022_server,
        'shadowtls_password': _identity.passwords.shadowtls_ss_server,
        'vless_reality_vision_enabled': enable_vless_reality_vision | bool,
        'vless_reality_vision_port': singbox_port_vless_vision | int,
        'vless_reality_grpc_enabled': enable_vless_reality_grpc | bool,
        'vless_reality_grpc_port': singbox_port_vless_grpc | int,
        'vless_reality_xhttp_enabled': enable_vless_reality_xhttp | bool,
        'vless_reality_xhttp_port': singbox_port_vless_xhttp | int,
        'hysteria2_enabled': enable_hysteria2 | bool,
        'hysteria2_port': singbox_port_hysteria2 | int,
        'tuic_enabled': enable_tuic | bool,
        'tuic_port': singbox_port_tuic | int,
        'shadowsocks_enabled': enable_ss2022 | bool,
        'shadowsocks_port': singbox_port_ss2022 | int,
        'shadowtls_enabled': enable_shadowtls | bool,
        'shadowtls_port': singbox_port_shadowtls | int,
        'trojan_enabled': enable_trojan | bool,
        'trojan_port': singbox_port_trojan | int
      } | to_nice_json }}
    owner: root
    group: root
    mode: "0600"
  no_log: true

# The state file carries one client per client_name. Each client's per-client password (used by the
# password-based protocols via the renderer's per-identity ".password" override) is taken from the
# identity doc; REALITY/Vision clients need only name+id (uuid). One client = one ".password";
# protocols that need a distinct per-client secret beyond this single field are not represented by
# the CLI state model and fall through to the bundled fallback below. Built with jq (already
# installed) reading identity.json directly — robust and keeps secrets out of Ansible variables.
- name: Project the identity document into the myceliumctl --state file (clients roster, root-only)
  ansible.builtin.shell:
    cmd: >-
      umask 077;
      jq -n --slurpfile id {{ singbox_state_dir }}/identity.json
        '($id[0]) as $i
         | { version: 1,
             clients: ( $i.clients | to_entries | map({
                 name: .key,
                 id: .value,
                 created: ($i.generated_at // ""),
                 password: ( ($i.passwords.trojan[.key])
                             // ($i.passwords.hysteria2[.key])
                             // ($i.passwords.ss2022[.key])
                             // "" )
               }) ) }'
      > {{ singbox_state_dir }}/render-state.json
    executable: /bin/bash
  changed_when: true
  no_log: true

- name: Lock down the projected --state file (root-only; carries per-client secrets)
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}/render-state.json"
    owner: root
    group: root
    mode: "0600"

- name: Render config.json via myceliumctl (engine singbox) — preferred (REAL CLI contract)
  ansible.builtin.command:
    cmd: >-
      {{ singbox_tooling_dir }}/control/myceliumctl render-server
      --engine singbox
      --template {{ singbox_tooling_dir }}/{{ singbox_ctl_template_rel }}
      --params {{ singbox_state_dir }}/render-params.json
      --state {{ singbox_state_dir }}/render-state.json
      --out {{ singbox_config_path }}.tmp
  register: _render_ctl
  changed_when: _render_ctl.rc == 0
  failed_when: false
  when: _myceliumctl.stat.exists
  no_log: true

# Detect whether the PREFERRED path actually produced a config. We do NOT swallow a myceliumctl
# failure silently: if myceliumctl is present but the render did not yield a file, that is contract
# drift — abort in strict mode, otherwise emit a loud warning before using the Jinja fallback.
- name: Detect whether the myceliumctl render produced a config
  ansible.builtin.stat:
    path: "{{ singbox_config_path }}.tmp"
  register: _ctl_render_out

- name: Fail loudly when the preferred myceliumctl render path drifted (strict mode)
  ansible.builtin.fail:
    msg: >-
      myceliumctl render-server (engine singbox) is present but did not produce
      {{ singbox_config_path }}.tmp (rc={{ _render_ctl.rc | default('n/a') }}). This is control-tooling
      contract drift. Refusing to silently fall back because singbox_render_strict is true. Inspect the
      copied {{ singbox_tooling_dir }}/control/myceliumctl and its --params/--state/--template inputs.
  when:
    - _myceliumctl.stat.exists
    - not (_ctl_render_out.stat.exists | default(false))
    - singbox_render_strict | bool

- name: Warn loudly that the preferred myceliumctl render path drifted (falling back to Jinja)
  ansible.builtin.debug:
    msg: >-
      WARNING: myceliumctl render-server (engine singbox) is present but produced no config
      (rc={{ _render_ctl.rc | default('n/a') }}); falling back to the bundled Jinja renderer.
      This indicates control-tooling contract drift — set singbox_render_strict: true to fail closed.
  when:
    - _myceliumctl.stat.exists
    - not (_ctl_render_out.stat.exists | default(false))
    - not (singbox_render_strict | bool)

- name: Render config.json via the Jinja fallback (template -> tmp)
  ansible.builtin.template:
    src: config.template.json
    dest: "{{ singbox_config_path }}.tmp"
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0640"
  when: not (_ctl_render_out.stat.exists | default(false))
  no_log: true

- name: Validate the rendered config.json with "sing-box check"
  ansible.builtin.command:
    cmd: "{{ singbox_bin_path }} check -c {{ singbox_config_path }}.tmp"
  changed_when: false

- name: Promote the validated config.json into place
  ansible.builtin.copy:
    src: "{{ singbox_config_path }}.tmp"
    dest: "{{ singbox_config_path }}"
    remote_src: true
    owner: root
    group: "{{ singbox_run_group }}"
    mode: "0640"
  notify: Restart sing-box

- name: Remove the temporary rendered config
  ansible.builtin.file:
    path: "{{ singbox_config_path }}.tmp"
    state: absent

# ---------------------------------------------------------------------------
# 6. systemd unit — install, enable, start.
# ---------------------------------------------------------------------------
- name: Install the hardened sing-box systemd unit
  ansible.builtin.template:
    src: singbox.service.j2
    dest: /etc/systemd/system/sing-box.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart sing-box

# Open ONLY the ports of the enabled protocols (TCP and/or UDP). The hardening role opens SSH and
# the primary VLESS+REALITY+Vision port (listen_port == singbox_port_vless_vision by default); this
# task adds the remaining enabled protocols so the firewall surface matches exactly what is exposed.
- name: Open the firewall for each enabled TCP protocol
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: tcp
    comment: "mycelium sing-box {{ item.name }}"
  loop: "{{ _singbox_tcp_ports }}"
  loop_control:
    label: "{{ item.name }}:{{ item.port }}/tcp"
  vars:
    _singbox_tcp_ports: >-
      {{ ([{'name': 'vless-vision', 'port': singbox_port_vless_vision}] if enable_vless_reality_vision | bool else [])
       + ([{'name': 'vless-grpc',   'port': singbox_port_vless_grpc}]   if enable_vless_reality_grpc   | bool else [])
       + ([{'name': 'vless-xhttp',  'port': singbox_port_vless_xhttp}]  if enable_vless_reality_xhttp  | bool else [])
       + ([{'name': 'ss2022',       'port': singbox_port_ss2022}]       if enable_ss2022              | bool else [])
       + ([{'name': 'shadowtls',    'port': singbox_port_shadowtls}]    if enable_shadowtls            | bool else [])
       + ([{'name': 'trojan',       'port': singbox_port_trojan}]       if enable_trojan              | bool else []) }}

- name: Open the firewall for each enabled UDP protocol (QUIC)
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: udp
    comment: "mycelium sing-box {{ item.name }}"
  loop: "{{ _singbox_udp_ports }}"
  loop_control:
    label: "{{ item.name }}:{{ item.port }}/udp"
  vars:
    _singbox_udp_ports: >-
      {{ ([{'name': 'hysteria2', 'port': singbox_port_hysteria2}] if enable_hysteria2 | bool else [])
       + ([{'name': 'tuic',      'port': singbox_port_tuic}]      if enable_tuic      | bool else [])
       + ([{'name': 'ss2022',    'port': singbox_port_ss2022}]    if enable_ss2022    | bool else []) }}

- name: Flush handlers so sing-box is (re)started before we render subscriptions
  ansible.builtin.meta: flush_handlers

- name: Enable and start sing-box.service
  ansible.builtin.systemd:
    name: sing-box
    enabled: true
    state: started
    daemon_reload: true

# ---------------------------------------------------------------------------
# 7. Render client subscriptions on the node, then FETCH them to the operator's ./out/.
#    Only the REALITY PUBLIC key and the per-client subscriptions leave the node.
# ---------------------------------------------------------------------------
- name: Create the on-node subscriptions output directory
  ansible.builtin.file:
    path: "{{ singbox_state_dir }}/subscriptions"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Preferred path: the REAL CLI is `subscription` (NOT the nonexistent "render-client"), and it
# consumes the same --params/--state pair as render-server, emitting one <client>.singbox.json plus
# a <client>.clash.yaml per client into --out DIR. The control renderer emits per-node self-signed
# HY2/TUIC/Trojan WITHOUT a blanket insecure:true (ADR-0014); node_address comes from --params.
- name: Render client subscriptions via myceliumctl (engine singbox) — preferred (REAL CLI contract)
  ansible.builtin.command:
    cmd: >-
      {{ singbox_tooling_dir }}/control/myceliumctl subscription
      --engine singbox
      --params {{ singbox_state_dir }}/render-params.json
      --state {{ singbox_state_dir }}/render-state.json
      --out {{ singbox_state_dir }}/subscriptions
  register: _sub_ctl
  changed_when: _sub_ctl.rc == 0
  failed_when: false
  when: _myceliumctl.stat.exists
  no_log: true

# Fallback: build a standard sing-box outbound JSON per client for the ENABLED CERTLESS / pin-safe
# protocols ONLY, with jq reading the identity doc. One file per client aggregates that client's
# enabled-protocol outbounds.
#
# ADR-0014 (per-node credentials; no blanket insecure:true): the TLS-cert protocols Hysteria2, TUIC
# and Trojan use a per-node self-signed certificate that a client may trust ONLY via an explicit
# certificate/SPKI pin — NEVER via insecure:true (which accepts ANY cert and is MITM-open). This
# bundled jq fallback has no per-node cert pin available, so it DELIBERATELY OMITS the HY2/TUIC/
# Trojan client entries rather than emit them insecurely. Those protocols are delivered by the
# preferred myceliumctl `subscription` path (which carries the proper per-node material), or via the
# operator's own-domain ACME certificate. The fallback emits only REALITY (Vision/gRPC/XHTTP, which
# are certless and borrow the donor handshake), Shadowsocks-2022 (no TLS) and ShadowTLS (utls outer
# handshake, no insecure flag) — none of which require a cert pin.
- name: Detect whether myceliumctl produced subscription files
  ansible.builtin.find:
    paths: "{{ singbox_state_dir }}/subscriptions"
    patterns: "*.json,*.yaml,*.txt"
  register: _sub_existing

# Do NOT swallow a myceliumctl subscription failure silently. If the tool is present but emitted no
# files, that is contract drift: abort in strict mode, else warn loudly before the jq fallback runs.
- name: Fail loudly when the preferred myceliumctl subscription path drifted (strict mode)
  ansible.builtin.fail:
    msg: >-
      myceliumctl subscription (engine singbox) is present but emitted no subscription files
      (rc={{ _sub_ctl.rc | default('n/a') }}) into {{ singbox_state_dir }}/subscriptions. This is
      control-tooling contract drift. Refusing to silently fall back because singbox_render_strict
      is true.
  when:
    - _myceliumctl.stat.exists
    - (_sub_existing.matched | default(0)) == 0
    - singbox_render_strict | bool

- name: Warn loudly that the preferred myceliumctl subscription path drifted (falling back to jq)
  ansible.builtin.debug:
    msg: >-
      WARNING: myceliumctl subscription (engine singbox) is present but emitted no files
      (rc={{ _sub_ctl.rc | default('n/a') }}); falling back to the bundled jq renderer. This
      indicates control-tooling contract drift — set singbox_render_strict: true to fail closed.
  when:
    - _myceliumctl.stat.exists
    - (_sub_existing.matched | default(0)) == 0
    - not (singbox_render_strict | bool)

- name: Render per-client sing-box subscriptions via jq fallback (certless / pin-safe protocols only)
  when: (_sub_existing.matched | default(0)) == 0
  ansible.builtin.shell:
    cmd: >-
      set -euo pipefail;
      ID={{ singbox_state_dir }}/identity.json;
      ADDR={{ node_address | quote }};
      SNI={{ donor_sni | quote }};
      PBK=$(jq -r '.reality.public_key' "$ID");
      SID=$(jq -r '.short_ids[0]' "$ID");
      jq -r '.clients | to_entries[] | "\(.key)\t\(.value)"' "$ID"
      | while IFS=$'\t' read -r name uuid; do
          out={{ singbox_state_dir }}/subscriptions/"$name".singbox.json;
          sspw=$(jq -r --arg n "$name" '.passwords.ss2022[$n] // empty' "$ID");
          stpw=$(jq -r --arg n "$name" '.passwords.shadowtls[$n] // empty' "$ID");
          ssserver=$(jq -r '.passwords.ss2022_server // empty' "$ID");
          jq -n
            --arg addr "$ADDR" --arg sni "$SNI" --arg pbk "$PBK" --arg sid "$SID"
            --arg uuid "$uuid" --arg name "$name"
            --arg sspw "$sspw" --arg stpw "$stpw" --arg ssserver "$ssserver"
            --argjson en_vision {{ (enable_vless_reality_vision | bool) | to_json }}
            --argjson en_grpc {{ (enable_vless_reality_grpc | bool) | to_json }}
            --argjson en_xhttp {{ (enable_vless_reality_xhttp | bool) | to_json }}
            --argjson en_ss {{ (enable_ss2022 | bool) | to_json }}
            --argjson en_st {{ (enable_shadowtls | bool) | to_json }}
            --argjson p_vision {{ singbox_port_vless_vision | int }}
            --argjson p_grpc {{ singbox_port_vless_grpc | int }}
            --argjson p_xhttp {{ singbox_port_vless_xhttp | int }}
            --argjson p_ss {{ singbox_port_ss2022 | int }}
            --argjson p_st {{ singbox_port_shadowtls | int }}
            --arg ssmethod {{ singbox_ss2022_method | quote }}
            --arg sthandshake {{ singbox_shadowtls_handshake_server | quote }}
            '
            def reality_tls: { enabled: true, server_name: $sni, utls: { enabled: true, fingerprint: "chrome" }, reality: { enabled: true, public_key: $pbk, short_id: $sid } };
            { outbounds: (
                (if $en_vision then [ { type: "vless", tag: ("vless-vision-" + $name), server: $addr, server_port: $p_vision, uuid: $uuid, flow: "xtls-rprx-vision", tls: reality_tls } ] else [] end)
              + (if $en_grpc   then [ { type: "vless", tag: ("vless-grpc-" + $name),   server: $addr, server_port: $p_grpc,   uuid: $uuid, tls: reality_tls, transport: { type: "grpc", service_name: "grpc" } } ] else [] end)
              + (if $en_xhttp  then [ { type: "vless", tag: ("vless-xhttp-" + $name),  server: $addr, server_port: $p_xhttp,  uuid: $uuid, tls: reality_tls, transport: { type: "xhttp", path: "/xhttp" } } ] else [] end)
              + (if $en_ss     then [ { type: "shadowsocks", tag: ("ss2022-" + $name), server: $addr, server_port: $p_ss, method: $ssmethod, password: ($ssserver + ":" + $sspw) } ] else [] end)
              + (if $en_st     then [ { type: "shadowsocks", tag: ("shadowtls-" + $name), method: $ssmethod, password: $sspw, detour: ("shadowtls-out-" + $name) }, { type: "shadowtls", tag: ("shadowtls-out-" + $name), server: $addr, server_port: $p_st, version: 3, password: $stpw, tls: { enabled: true, server_name: $sthandshake, utls: { enabled: true, fingerprint: "chrome" } } } ] else [] end)
              ) }
            ' > "$out";
        done
    executable: /bin/bash
  changed_when: true
  no_log: true

- name: Export the REALITY public key (clients need it; private key stays on node)
  ansible.builtin.shell:
    cmd: "jq -r '.reality.public_key' {{ singbox_state_dir }}/identity.json > {{ singbox_state_dir }}/reality_public_key.txt"
    executable: /bin/bash
  changed_when: false

- name: Ensure the operator output directories exist on the control host
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ singbox_out_public_dir }}"
    - "{{ singbox_out_subscriptions_dir }}"
  delegate_to: localhost
  become: false

- name: List rendered subscription files on the node
  ansible.builtin.find:
    paths: "{{ singbox_state_dir }}/subscriptions"
    patterns: "*.json,*.yaml,*.txt"
  register: _sub_files

- name: Fetch rendered subscriptions to the operator's ./out/subscriptions/
  ansible.builtin.fetch:
    src: "{{ item.path }}"
    dest: "{{ singbox_out_subscriptions_dir }}/{{ inventory_hostname }}/"
    flat: false
  loop: "{{ _sub_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Fetch the REALITY public key to the operator's ./out/
  ansible.builtin.fetch:
    src: "{{ singbox_state_dir }}/reality_public_key.txt"
    dest: "{{ singbox_out_public_dir }}/{{ inventory_hostname }}-reality_public_key.txt"
    flat: true

# The projected --params/--state files mirror secrets out of identity.json (REALITY private key,
# protocol passwords). identity.json (root 0600) is the canonical store, so remove the projections
# once rendering is done — they should not linger as a second copy.
- name: Remove the projected myceliumctl render inputs (secret-bearing; identity.json is canonical)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ singbox_state_dir }}/render-params.json"
    - "{{ singbox_state_dir }}/render-state.json"

- name: Report where the operator can find the fetched artefacts
  ansible.builtin.debug:
    msg:
      - "Client subscriptions: {{ singbox_out_subscriptions_dir }}/{{ inventory_hostname }}/"
      - "REALITY public key:   {{ singbox_out_public_dir }}/{{ inventory_hostname }}-reality_public_key.txt"
      - "REALITY private key, client UUIDs, and all server passwords remain ONLY on the node ({{ singbox_state_dir }}/identity.json, root 0600)."
