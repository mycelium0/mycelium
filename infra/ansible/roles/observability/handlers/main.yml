# Mycelium Phase 0 — observability role handlers.
# Author: mindicator & silicon bags quartet
---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    enabled: true
