#
# Release — on a pushed `v*` tag, build the deterministic source artifact (`make dist`) and publish a
# GitHub Release with notes from CHANGELOG.md (RP-0011 REL-2). The tag is the authenticity root: the
# maintainer signs it locally with their SSH key (the scheme verify_signed_ref / --allowed-signers
# uses, ADR-0015), and signs SHA256SUMS the same way — see docs/RELEASING.md. CI holds NO signing
# secret: it only builds + publishes (a CI compromise cannot forge a release). Third-party actions are
# pinned to a full commit SHA (supply-chain hygiene), mirroring ci.yml.

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build source artifact + publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0   # full history + the tag, so `git archive <tag>` works
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Guard — the tag must match the spine version (no drift)
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -E '^[[:space:]]*const[[:space:]]+Version' internal/spec/version.go | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match internal/spec.Version $ver — bump one to match before tagging"; exit 1
          fi
          echo "releasing v$ver"
      - name: Build the deterministic source artifact
        run: make dist DIST_REF="${GITHUB_REF_NAME}"
      - name: Verify the artifact (release_dist_sane gate, with a git work tree)
        run: MYC_REPO_ROOT="$PWD" bash tests/conformance/release_dist_sane.sh
      - name: Extract release notes from CHANGELOG.md
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" 'BEGIN{p=0} /^## \[/{ if(p) exit; if(index($0,"["v"]")>0) p=1 } p{print}' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            printf '# Mycelium %s\n\nSee CHANGELOG.md.\n' "${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/mycelium-*.tar.gz dist/SHA256SUMS \
            --title "Mycelium ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
