# Keep GitHub Actions versions current (and SHA-pinnable) for supply-chain hygiene
# (see docs/dependency-policy.md).

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
